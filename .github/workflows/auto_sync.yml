name: Sync Workflow

on:
  schedule:
    - cron: '30 5 * * *'   # 11:00 AM IST
    - cron: '30 11 * * *'  #  5:00 PM IST
    - cron: '30 17 * * *'  # 11:00 PM IST
    - cron: '30 23 * * *'  #  5:00 AM IST
  workflow_dispatch:

jobs:
  sync:
    name: Sync followers & following
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run sync
        env:
          # Name your repo secret GH_ANALYTICS_TOKEN (not GITHUB_TOKEN — that's reserved by GHA)
          # and map it here so the backend code sees GITHUB_TOKEN
          GITHUB_TOKEN: ${{ secrets.GH_ANALYTICS_TOKEN }}
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: python scripts/sync.py
